name: Generate AAR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Matches your project's gradle-wrapper properties target version
    - name: Setup and Run Gradle Build
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.0.0'
        arguments: :animator:assembleRelease

    # Uploads the finished AAR so you can download it
    - name: Upload AAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: animator-release-aar
        path: '**/build/outputs/aar/*-release.aar'
